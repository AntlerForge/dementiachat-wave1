<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Care Chat Wave 1</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 id="appTitle">Care Chat</h1>
      <div class="role-picker">
        <label for="role">Role</label>
        <select id="role">
          <option value="dad">Dad View</option>
          <option value="caregiver">Caregiver View</option>
        </select>
      </div>
    </header>

    <main id="app"></main>

    <template id="dad-view-template">
      <section class="panel">
        <h2>Dad View</h2>
        <div id="dadThread" class="thread"></div>
        <form id="dadComposer" class="composer">
          <input id="dadInput" autocomplete="off" placeholder="Type message..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </template>

    <template id="caregiver-view-template">
      <section class="panel">
        <div class="caregiver-header">
          <h2>Caregiver View</h2>
          <div class="presence-group">
            <span id="dadOnlineDot" class="presence-dot" title="Dad connection status"></span>
            <span id="dadOnlineText" class="presence-text">Dad: checking...</span>
            <span id="dadTypingIndicator" class="typing-indicator" hidden>Dad is typing...</span>
          </div>
        </div>
        <nav class="tabs" id="tabs">
          <button data-tab="chat" class="active">Chat</button>
          <button data-tab="dad-ui">UI Controls</button>
          <button data-tab="ai-rules">AI Rules</button>
        </nav>

        <section data-pane="chat" class="pane active">
          <div id="caregiverThread" class="thread"></div>
          <form id="caregiverComposer" class="composer caregiver-composer">
            <button id="openPhotoPicker" type="button" class="composer-plus" aria-label="Add photo">+</button>
            <input id="caregiverInput" autocomplete="off" placeholder="Reply to Dad..." />
            <button type="submit">Send</button>
          </form>
          <input id="caregiverImageFile" type="file" accept="image/*" hidden />
          <div id="caregiverPhotoTray" class="photo-tray" hidden>
            <img id="caregiverImagePreview" class="photo-tray-preview" alt="Selected photo preview" />
            <div class="photo-tray-controls">
              <button id="chooseCaregiverImage" type="button">Choose photo</button>
              <select id="imageSize" aria-label="Photo size">
                <option value="small">Small</option>
                <option value="medium" selected>Medium</option>
                <option value="large">Large</option>
              </select>
              <button id="sendCaregiverImage" type="button">Send Photo</button>
              <button id="clearCaregiverImage" type="button">Close</button>
            </div>
            <p id="imageStatus" class="status"></p>
          </div>
          <div id="dadAlertBanner" class="dad-alert-banner" hidden>
            <div id="dadAlertText"></div>
            <div class="dad-alert-actions">
              <button id="enableAlerts" type="button">Enable alerts</button>
              <button id="clearDadAlert" type="button">Clear alert</button>
            </div>
          </div>
          <div id="outboxStatus" class="status"></div>
        </section>

        <section data-pane="dad-ui" class="pane">
          <h3>Dad controls</h3>
          <div class="row">
            <label for="fontScale">Chat font size</label>
            <input id="fontScale" type="range" min="12" max="34" value="22" />
          </div>
          <div class="row">
            <label for="dadUiFontScale">UI font size</label>
            <input id="dadUiFontScale" type="range" min="12" max="24" value="16" />
          </div>
          <div class="row">
            <label for="theme">Theme</label>
            <select id="theme">
              <option value="high-contrast">High contrast</option>
              <option value="warm">Warm soft</option>
              <option value="dark">Dark high contrast</option>
            </select>
          </div>
          <div class="row">
            <label for="bubbleWidth">Bubble width</label>
            <input id="bubbleWidth" type="range" min="60" max="95" value="80" />
          </div>
          <div class="row">
            <label for="dadAlertsEnabled">Dad desktop alerts</label>
            <select id="dadAlertsEnabled">
              <option value="1">Enabled</option>
              <option value="0">Disabled</option>
            </select>
          </div>
          <button id="previewSettings">Preview in this panel</button>
          <button id="applySettings">Apply to Dad</button>
          <div class="row dad-ui-preview">
            <label>Preview (caregiver only)</label>
            <div id="dadUiPreviewThread" class="thread">
              <article class="bubble">Sample message to Dad</article>
              <article class="bubble me">Sample reply from caregiver</article>
            </div>
          </div>
          <p id="previewNote" class="status"></p>

          <h3>Caregiver controls</h3>
          <div class="row">
            <label for="caregiverFontScale">Chat font size</label>
            <input id="caregiverFontScale" type="range" min="12" max="28" value="18" />
          </div>
          <div class="row">
            <label for="caregiverUiFontScale">UI font size</label>
            <input id="caregiverUiFontScale" type="range" min="12" max="24" value="16" />
          </div>
          <div class="row">
            <label for="caregiverTheme">Theme</label>
            <select id="caregiverTheme">
              <option value="clear">Clear blue</option>
              <option value="warm">Warm soft</option>
              <option value="dark">Dark high contrast</option>
            </select>
          </div>
          <div class="row">
            <label for="caregiverBubbleWidth">Bubble width</label>
            <input id="caregiverBubbleWidth" type="range" min="60" max="95" value="84" />
          </div>
          <button id="applyCaregiverUi" type="button">Apply to caregiver view</button>
          <p id="caregiverUiStatus" class="status"></p>
          <h3>App versions</h3>
          <div class="row">
            <p id="caregiverVersionInfo" class="status"></p>
            <p id="dadVersionInfo" class="status"></p>
            <button id="refreshVersionInfo" type="button">Refresh version status</button>
          </div>
        </section>

        <section data-pane="ai-rules" class="pane">
          <div class="row">
            <label for="trustLevel">Trust level</label>
            <select id="trustLevel">
              <option value="1">1 - Manual</option>
              <option value="2">2 - Suggested</option>
              <option value="3">3 - Delayed Auto</option>
            </select>
          </div>
          <div class="row">
            <label for="delaySeconds">Delayed auto seconds</label>
            <input id="delaySeconds" type="number" min="30" max="900" value="180" />
          </div>
          <button id="saveRules">Save Rules</button>
          <p class="subtext">Level 3 sends only after timeout and only once (idempotent behavior expected server-side).</p>
          <p id="rulesStatus" class="status"></p>
        </section>
      </section>
    </template>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
